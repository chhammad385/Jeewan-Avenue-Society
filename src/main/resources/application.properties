# Server Configuration
server.port=8082

# Production domain configuration
app.domain=jeewanavenuesociety.me
app.allowed-origins=https://jeewanavenuesociety.me,https://www.jeewanavenuesociety.me,http://jeewanavenuesociety.me,http://www.jeewanavenuesociety.me,http://localhost:8082,http://localhost:3000,http://127.0.0.1:5500,http://localhost:5173

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/jeewan_avenue?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# Use 'validate' once schema is stable; 'update' during development if needed.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Force ISO date strings (not timestamps / arrays)
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# Optional: specify time zone if you want a fixed zone in serialization
# spring.jackson.time-zone=UTC

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads/

# Security and CORS Configuration
app.security.jwt.secret=JeewanAvenueSecretKey2024
app.security.jwt.expiration=86400000

# Session Configuration for production
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# Logging Configuration
logging.level.com.jeewanavenue=INFO
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Environment Profile
spring.profiles.active=dev

# Enhanced Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

# Performance Configuration
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration (Development)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000