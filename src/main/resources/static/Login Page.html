<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jeewan Avenue</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: url('/image/Gate.jpeg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            margin: 0 auto;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 26px;
            color: #34495e;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #fff;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        /* Enhanced select styling */
        .input-group select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 14px center;
            background-repeat: no-repeat;
            background-size: 18px;
            padding-right: 50px;
            cursor: pointer;
            min-height: 52px;
            line-height: 1.2;
        }

        .input-group select:hover {
            border-color: #3498db;
            background-color: #f8f9fa;
            transform: translateY(-1px);
            transition: all 0.2s ease;
        }

        .input-group select option {
            padding: 12px 16px;
            font-size: 14px;
            color: #2c3e50;
            background-color: #fff;
            border: none;
            line-height: 1.3;
            min-height: 42px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .input-group select option:hover {
            background-color: #e3f2fd;
            color: #1976d2;
        }

        .input-group select option:checked {
            background-color: #3498db;
            color: white;
            font-weight: 600;
        }

        .input-group select option[disabled] {
            color: #95a5a6;
            font-style: italic;
            background-color: #f8f9fa;
        }

        /* Mobile-specific select enhancements */
        @media (max-width: 768px) {
            .input-group select {
                /* Ensure proper tap target size */
                min-height: 50px;
                font-size: 16px; /* Prevents zoom on iOS */
                padding: 14px 50px 14px 15px;
                background-size: 18px;
                background-position: right 14px center;
            }
            
            .input-group select option {
                min-height: 44px;
                line-height: 1.2;
                padding: 12px 16px;
                font-size: 15px;
                max-width: 100%;
            }
        }
        
        /* Enhanced focus states for accessibility */
        .input-group select:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
            background-color: #ffffff;
        }
        
        /* Loading state for form submission */
        .btn.loading {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            cursor: not-allowed;
            position: relative;
        }
        
        .btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            margin: auto;
            border: 2px solid transparent;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .password-container {
            position: relative;
        }

        .password-container input {
            padding-right: 50px;
        }

        .eye-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #7f8c8d;
            width: 20px;
            height: 20px;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            z-index: 10;
        }

        .eye-icon:hover {
            color: #3498db;
        }

        .eye-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn {
            display: block;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 14px 20px;
            border: none;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            margin-top: 10px;
        }

        .btn:hover {
            background: linear-gradient(135deg, #c0392b, #a93226);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        .switch {
            margin-top: 15px;
            font-size: 14px;
        }

        .switch a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .switch a:hover {
            text-decoration: underline;
        }

        .forgot-password {
            display: block;
            margin-top: 10px;
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Error popup styles */
        .error-popup {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s;
            padding: 20px;
            box-sizing: border-box;
        }

        .error-popup-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: slideIn 0.3s;
        }

        .error-popup h3 {
            color: #e74c3c;
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: 600;
        }

        .error-popup p {
            color: #2c3e50;
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 16px;
        }

        .close-popup {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .close-popup:hover {
            background: linear-gradient(135deg, #c0392b, #a93226);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .container {
                padding: 30px 25px;
                max-width: 100%;
                margin: 0;
            }
            
            h2 {
                font-size: 22px;
                margin-bottom: 25px;
            }
            
            .input-group {
                margin-bottom: 18px;
            }
            
            .input-group input, .input-group select {
                padding: 12px 14px;
                font-size: 16px;
            }
            
            .input-group select {
                background-size: 12px;
                background-position: right 8px center;
                padding-right: 30px;
            }
            
            .input-group select option {
                padding: 8px 12px;
                font-size: 14px;
                min-height: 38px;
            }
            
            .password-container input {
                padding-right: 45px;
            }
            
            .eye-icon {
                right: 14px;
            }
            
            .btn {
                padding: 12px 18px;
                font-size: 16px;
            }
            
            .error-popup-content {
                margin: 15% auto;
                padding: 25px 20px;
                width: 95%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 25px 20px;
                border-radius: 12px;
            }
            
            h2 {
                font-size: 20px;
                margin-bottom: 20px;
            }
            
            .input-group {
                margin-bottom: 16px;
            }
            
            .input-group label {
                font-size: 13px;
                margin-bottom: 6px;
            }
            
            .input-group input, .input-group select {
                padding: 13px 14px;
                font-size: 16px;
                border-radius: 6px;
            }
            
            .input-group select {
                padding-right: 45px;
                min-height: 48px;
                background-size: 16px;
                background-position: right 10px center;
            }
            
            .input-group select option {
                font-size: 15px;
                padding: 10px 14px;
                min-height: 40px;
            }
            
            .password-container input {
                padding-right: 45px;
            }
            
            .eye-icon {
                right: 12px;
            }
            
            .btn {
                padding: 12px 16px;
                font-size: 15px;
            }
            
            .error-popup-content {
                margin: 15% auto;
                padding: 20px 15px;
                width: 95%;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 8px;
            }
            
            .container {
                padding: 20px 15px;
                border-radius: 10px;
            }
            
            h2 {
                font-size: 18px;
                margin-bottom: 15px;
            }
            
            .input-group {
                margin-bottom: 14px;
            }
            
            .input-group label {
                font-size: 12px;
                margin-bottom: 5px;
            }
            
            .input-group input, .input-group select {
                padding: 12px 13px;
                font-size: 16px;
                border-radius: 5px;
            }
            
            .input-group select {
                background-size: 16px;
                background-position: right 10px center;
                padding-right: 40px;
                min-height: 48px;
            }
            
            .input-group select option {
                padding: 12px 15px;
                font-size: 16px;
                min-height: 44px;
            }
            
            .password-container input {
                padding-right: 42px;
            }
            
            .eye-icon {
                right: 12px;
                width: 18px;
                height: 18px;
            }
            
            .eye-icon svg {
                width: 16px;
                height: 16px;
            }
            
            .btn {
                padding: 11px 16px;
                font-size: 15px;
            }
            
            .error-popup {
                padding: 15px;
            }
            
            .error-popup-content {
                margin: 20% auto;
                padding: 20px 15px;
                width: 98%;
                border-radius: 12px;
            }
            
            .error-popup h3 {
                font-size: 18px;
                margin-bottom: 12px;
            }
            
            .error-popup p {
                font-size: 15px;
                margin-bottom: 20px;
            }
            
            .close-popup {
                padding: 10px 20px;
                font-size: 15px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 20px 15px;
            }
            
            h2 {
                font-size: 18px;
            }
            
            .input-group input, .input-group select {
                padding: 10px;
                font-size: 14px;
            }
            
            .input-group select {
                background-size: 12px;
                background-position: right 6px center;
                padding-right: 28px;
            }
            
            .input-group select option {
                padding: 6px 10px;
                font-size: 13px;
            }
            
            .btn {
                padding: 10px 14px;
                font-size: 14px;
            }
        }

        /* Landscape orientation for mobile devices */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 10px;
                align-items: flex-start;
                padding-top: 20px;
            }
            
            .container {
                margin-top: 0;
                padding: 20px;
            }
            
            h2 {
                font-size: 20px;
                margin-bottom: 15px;
            }
            
            .input-group {
                margin-bottom: 12px;
            }
            
            .error-popup-content {
                margin: 5% auto;
                max-height: 80vh;
                overflow-y: auto;
            }
        }

        /* Additional responsive optimizations for select options */
        @media (max-width: 320px) {
            .input-group select {
                padding-right: 35px;
                background-size: 12px;
                background-position: right 6px center;
                min-height: 44px;
            }
            
            .input-group select option {
                font-size: 13px;
                padding: 6px 10px;
                min-height: 32px;
                line-height: 1.2;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
        }

        /* Ultra-compact for very small screens */
        @media (max-width: 280px) {
            .input-group select option {
                font-size: 12px;
                padding: 5px 8px;
                min-height: 28px;
                line-height: 1.1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-form">
            <h2>Login to Jeewan Avenue</h2>
            <form method="post" action="/login" id="loginForm">
                <div class="input-group">
                    <label for="login-email">Email:</label>
                    <input type="email" name="email" id="login-email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password:</label>
                    <div class="password-container">
                        <input type="password" name="password" id="login-password" placeholder="Enter your password" required>
                        <span class="eye-icon" onclick="togglePassword()" id="eye-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="position">Select Your Position:</label>
                    <select name="role" id="position" required>
                        <option value="" disabled selected>🏘️ Choose your role in Jeewan Avenue</option>
                        <option value="society-member">🏡 Society Member - Resident</option>
                        <option value="president">👑 President - Society Leader</option>
                        <option value="vice-president">🤝 Vice-President - Deputy Leader</option>
                        <option value="general-secretary">📋 General Secretary - Administration</option>
                        <option value="finance-secretary">💰 Finance Secretary - Financial Management</option>
                        <option value="information-secretary">📢 Information Secretary - Communications</option>
                    </select>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>            
        </div>
    </div>

    <!-- Error Popup -->
    <div id="errorPopup" class="error-popup">
        <div class="error-popup-content">
            <h3>🚫 Login Failed</h3>
            <p id="errorMessage">Incorrect email, password, or role selection. Please check your credentials and try again.</p>
            <button class="close-popup" onclick="closeErrorPopup()">Try Again</button>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordField = document.getElementById('login-password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.innerHTML = `
                    <svg viewBox="0 0 24 24">
                        <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                    </svg>
                `;
            } else {
                passwordField.type = 'password';
                eyeIcon.innerHTML = `
                    <svg viewBox="0 0 24 24">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                `;
            }
        }

        // Show error popup
        function showErrorPopup(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorPopup').style.display = 'block';
        }

        // Close error popup
        function closeErrorPopup() {
            document.getElementById('errorPopup').style.display = 'none';
        }

        // Close popup when clicking outside
        window.onclick = function(event) {
            const popup = document.getElementById('errorPopup');
            if (event.target === popup) {
                closeErrorPopup();
            }
        }

        // Check for login errors on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Check for error parameter in URL
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            
            if (error === 'true' || error === '1') {
                showErrorPopup('Incorrect email, password, or role selection. Please check your credentials and try again.');
            } else if (error === 'invalid') {
                showErrorPopup('Invalid login credentials. Please verify your email, password, and role.');
            } else if (error === 'unauthorized') {
                showErrorPopup('Access denied. Please check your role selection and credentials.');
            }

            // Also check for any other error indicators
            if (window.location.href.includes('error') || window.location.href.includes('failed')) {
                showErrorPopup('Login failed. Please check your credentials and try again.');
            }
        });

        // Enhanced form submission with better error handling
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const role = document.getElementById('position').value;
            const submitBtn = this.querySelector('.btn');

            // Basic client-side validation
            if (!email || !password || !role) {
                e.preventDefault();
                showErrorPopup('Please fill in all fields before submitting.');
                return false;
            }

            if (!email.includes('@')) {
                e.preventDefault();
                showErrorPopup('Please enter a valid email address.');
                return false;
            }

            if (password.length < 3) {
                e.preventDefault();
                showErrorPopup('Password seems too short. Please check your password.');
                return false;
            }

            // Add loading state to button
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Signing In...';
            submitBtn.disabled = true;
        });

        // Add smooth interactions for select dropdown
        document.addEventListener('DOMContentLoaded', function() {
            const selectElement = document.getElementById('position');
            const selectLabel = document.querySelector('label[for="position"]');
            
            // Add visual feedback when option is selected
            selectElement.addEventListener('change', function() {
                if (this.value) {
                    this.style.borderColor = '#27ae60';
                    this.style.boxShadow = '0 0 0 3px rgba(39, 174, 96, 0.1)';
                    selectLabel.style.color = '#27ae60';
                    
                    // Reset after 2 seconds
                    setTimeout(() => {
                        this.style.borderColor = '#e1e8ed';
                        this.style.boxShadow = 'none';
                        selectLabel.style.color = '#2c3e50';
                    }, 2000);
                }
            });
            
            // Add hover effects for better UX
            selectElement.addEventListener('mouseenter', function() {
                if (!this.value) {
                    this.style.borderColor = '#3498db';
                }
            });
            
            selectElement.addEventListener('mouseleave', function() {
                if (!this.value) {
                    this.style.borderColor = '#e1e8ed';
                }
            });
        });
    </script>
</body>
</html>
