<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Accounts - Jeewan Avenue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .page-title {
            text-align: center;
            padding: 30px 20px;
            background: white;
            margin: 20px auto;
            max-width: 1200px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .page-title h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin: 0;
        }

        .page-title p {
            color: #7f8c8d;
            margin-top: 10px;
        }
        
        .section-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            gap: 30px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .btn {
            background: white;
            color: black;
            text-align: center;
            border-radius: 15px;
            width: 180px;
            height: 120px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(26, 188, 156, 0.4);
        }

        .btn .emoji {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .summary-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .summary-container h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .date-filter {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .date-filter label {
            font-weight: 600;
            color: #2c3e50;
        }

        .date-filter input[type="date"] {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .date-filter button {
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .date-filter button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 188, 156, 0.4);
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .summary-card.income {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .summary-card.expense {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        }

        .summary-card.balance {
            background: linear-gradient(135deg, #3f51b1 0%, #5a55ae 100%);
        }

        .summary-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .summary-card .amount {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
        }

        @media (max-width: 768px) {
            .btn {
                width: 150px;
                height: 100px;
                font-size: 18px;
            }

            .btn .emoji {
                font-size: 2.5rem;
            }

            .page-title h1 {
                font-size: 2rem;
            }

            .summary-container {
                padding: 20px;
            }

            .date-filter {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="page-title">
        <h1>🤲 Charity Account Page</h1>
        <p>Manage Charity Income, Expenses, and Financial Summary</p>
    </div>

    <div class="section-container">
        <button class="btn" onclick="window.location.href='Charity-Income.html'">
            <span class="emoji">💰</span>
            Charity Income
        </button>
        <button class="btn" onclick="window.location.href='Charity-Expense.html'">
            <span class="emoji">🛒</span>
            Charity Expense
        </button>
    </div>

    <div class="summary-container">
        <h2>📊 Charity Financial Summary</h2>
        
        <div class="date-filter">
            <label for="startDate">From:</label>
            <input type="date" id="startDate">
            
            <label for="endDate">To:</label>
            <input type="date" id="endDate">
            
            <button onclick="filterByDate()">Apply Filter</button>
            <button onclick="clearFilter()">Clear</button>
        </div>

        <div class="summary-cards">
            <div class="summary-card income">
                <h3>Total Income</h3>
                <p class="amount" id="totalIncome">Rs. 0</p>
            </div>
            
            <div class="summary-card expense">
                <h3>Total Expense</h3>
                <p class="amount" id="totalExpense">Rs. 0</p>
            </div>
            
            <div class="summary-card balance">
                <h3>Net Balance</h3>
                <p class="amount" id="netBalance">Rs. 0</p>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/announcement-popup.js"></script>
    <script src="/js/header-menu.js"></script>
    
    <script>
        // Load header
        document.addEventListener('DOMContentLoaded', () => {
            fetch('header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header').innerHTML = data;
                    if (window.initializeHamburgerMenu) {
                        initializeHamburgerMenu();
                    }
                });

            // Set default dates (last 30 days)
            const today = new Date();
            const thirtyDaysAgo = new Date(today.getTime() - (30 * 24 * 60 * 60 * 1000));
            
            document.getElementById('endDate').valueAsDate = today;
            document.getElementById('startDate').valueAsDate = thirtyDaysAgo;

            // Load initial summary
            loadCharitySummary();
        });

        async function loadCharitySummary(startDate = null, endDate = null) {
            try {
                // Build API URL with date filters if provided
                let url = '/api/charity/financial-summary';
                if (startDate && endDate) {
                    url += `?startDate=${startDate}&endDate=${endDate}`;
                }

                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('Failed to fetch charity financial summary');
                }

                const data = await response.json();
                
                document.getElementById('totalIncome').textContent = `Rs. ${formatCurrency(data.totalIncome || 0)}`;
                document.getElementById('totalExpense').textContent = `Rs. ${formatCurrency(data.totalExpense || 0)}`;
                document.getElementById('netBalance').textContent = `Rs. ${formatCurrency(data.netBalance || 0)}`;
                
            } catch (error) {
                console.error('Error loading charity summary:', error);
                showError('❌ Could not load charity financial summary');
            }
        }

        function filterByDate() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                showError('Please select both start and end dates');
                return;
            }

            if (new Date(startDate) > new Date(endDate)) {
                showError('Start date must be before end date');
                return;
            }

            loadCharitySummary(startDate, endDate);
        }

        function clearFilter() {
            // Reset to last 30 days
            const today = new Date();
            const thirtyDaysAgo = new Date(today.getTime() - (30 * 24 * 60 * 60 * 1000));
            
            document.getElementById('endDate').valueAsDate = today;
            document.getElementById('startDate').valueAsDate = thirtyDaysAgo;
            
            loadCharitySummary();
        }

        function formatCurrency(amount) {
            return parseFloat(amount).toLocaleString('en-PK', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
    </script>
</body>
</html>
