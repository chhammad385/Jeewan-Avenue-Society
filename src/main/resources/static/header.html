<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header - Jeewan Avenue</title>
    <!-- Google Fonts Import -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .header {
            background-color: #1abc9c;
            color: white;
            font-weight: bold;
            text-align: center;
            padding-top: 7px;
            padding-bottom: 8px;
            font-size: 15px;
        }

        .navbar {
            background-color: #1a2b49;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 15px;
            flex-wrap: nowrap;
            /* ✅ Prevent user-photo from dropping to next row */
            overflow-x: hidden;
            /* Optional: allow scroll on smaller screens */
            position: relative;
            z-index: 9998;
        }

        .logo-container img {
            transition: transform 0.3s ease;
            max-height: 90px;
            width: auto;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        .menu-container {
            display: flex;
            gap: 12px;
            margin-left: 50px;
        }

        .menu-block {
            background: white;
            color: black;
            text-align: center;
            padding-top: 10px;
            border-radius: 8px;
            width: 90px;
            height: 80px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            font-size: 12px;
            line-height: 1.1;
        }

        .menu-block:hover,
        .menu-block.active {
            background: #1abc9c;
            color: white;
        }

        .user-photo {
            width: 130px;
            height: 130px;
            border-radius: 10%;
            object-fit: cover;
            margin-left: 10px;
        }

        .text-white {
            font-size: 35px;
            color: white;
            margin-right: 15px;
        }

        .hamburger {
            display: none;
            font-size: 30px;
            color: white;
            cursor: pointer;
            order: -1;
            /* Places hamburger before user photo */
            z-index: 2147483649;
            position: relative;
            padding: 5px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .hamburger:hover {
            color: #1abc9c;
            transform: scale(1.1);
            transition: all 0.2s ease;
        }

        /* Media query for screens smaller than 768px */
        @media screen and (max-width: 768px) {
            .navbar {
                padding-left: 15px;
                flex-wrap: wrap;
                justify-content: flex-end;
                /* Align items to the right */
            }

            .logo-container img {
                width: 130px;
                max-height: 100px;
            }

            .menu-container {
                display: none;
                /* Hide menu by default on small screens */
                flex-direction: column;
                width: 100%;
                margin-left: 0;
                background-color: #1a2b49;
                position: fixed;
                top: 200px;
                /* Position below navbar and header */
                left: 0;
                padding: 15px;
                z-index: 2147483648;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
                border-top: 2px solid #1abc9c;
                border: 2px solid #1abc9c;
                border-radius: 5px;
                max-height: calc(100vh - 220px);
                /* Better height calculation */
                overflow-y: auto;
                /* Enable vertical scrolling */
                overflow-x: hidden;
                /* Prevent horizontal scrolling */
                scrollbar-width: thin;
                /* For Firefox */
                scrollbar-color: #1abc9c #1a2b49;
                /* For Firefox */
            }

            /* Custom scrollbar for WebKit browsers */
            .menu-container::-webkit-scrollbar {
                width: 8px;
            }

            .menu-container::-webkit-scrollbar-track {
                background: #1a2b49;
                border-radius: 4px;
            }

            .menu-container::-webkit-scrollbar-thumb {
                background: #1abc9c;
                border-radius: 4px;
            }

            .menu-container::-webkit-scrollbar-thumb:hover {
                background: #17a085;
            }

            .menu-container.active,
            .menu-container.show {
                display: flex;
                /* Show menu when active */
                animation: slideDown 0.3s ease-out;
            }

            /* Add backdrop overlay */
            .menu-container.active::before,
            .menu-container.show::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(0, 0, 0, 0.3);
                z-index: -1;
                pointer-events: none;
                /* Don't interfere with scrolling */
            }

            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .menu-block {
                width: 90%;
                margin-bottom: 10px;
            }

            .hamburger {
                display: block;
                margin-right: 15px;
            }

            .logo-container {
                flex-grow: 1;
            }
        }
    </style>
</head>

<body>
    <div class="header">Welcome : Jeewan Avenue - Society</div>
    <div class="navbar">
        <div class="logo-container">
            <a href="/User Profile.html">
                <img src="/image/logo3.png" alt="Logo" width="200">
            </a>
            <span class="text-white"></span>
        </div>
        <div class="hamburger" id="hamburgerMenu">☰</div>
        <div class="menu-container" id="navMenu">
            <a href="User Profile.html" class="menu-block" id="profile">🙎🏻‍♂️<br />Profile</a>
            <a href="Plots.html" class="menu-block" id="plots">🏠<br />Plots</a>
            <a href="Accounts.html" class="menu-block" id="accounts">📋<br />Accounts</a>
            <a href="Member.html" class="menu-block" id="members">🧑🏻‍🤝‍🧑🏻<br />Members</a>
            <a href="Masjid-Accounts.html" class="menu-block" id="masjid">🕌<br />Masjid Accounts</a>
            <a href="Charity-Accounts.html" class="menu-block" id="charity">🤲<br />Charity Account</a>
            <a href="announcements.html" class="menu-block" id="announcements" onclick="event.preventDefault(); showAnnouncementPopup(); return false;">📢<br />Notices</a>
            <a href="Feedback.html" class="menu-block" id="feedback">💬<br />Feedback</a>
            <a href="Your Records.html" class="menu-block" id="records">📜<br />Your Records</a>
            <a href="Official Docs.html" class="menu-block" id="official-docs">📑<br />Official Docs</a>
            <a href="President Console.html" class="menu-block" id="president-console" data-role-required="PRESIDENT,GENERAL_SECRETARY,FINANCE_SECRETARY,INFORMATION_SECRETARY">👨‍⚖️<br />President Console</a>
            <a href="#" onclick="handleLogout()" class="menu-block" id="logout">🏃‍♂️‍➡️<br />Logout</a>
        </div>
        <div><img id="userProfileImage" src="" alt="User" class="user-photo" style="display: none;"></div>
    </div>

    <script>
        // Load common.js functions after header loads
        // The loadUserProfileImage function will be called from common.js with a delay
        // Note: showAnnouncementPopup() function is now defined globally in announcement-popup.js
    </script>
    <!-- Include announcement popup script -->
    <script src="/js/announcement-popup.js"></script>
    <!-- Include role permissions script -->
    <script src="/js/role-permissions.js"></script>
    <script>
        // Global hamburger menu functions that can be called from any page
        window.toggleMenu = function() {
            const menu = document.getElementById('navMenu');
            if (menu) {
                menu.classList.toggle('show');
            }
        };

        // Initialize hamburger menu functionality (to be called after header is loaded)
        window.initializeHamburgerMenu = function() {
            // Add click event listener to hamburger button
            const hamburgerButton = document.getElementById('hamburgerMenu');
            if (hamburgerButton) {
                hamburgerButton.addEventListener('click', window.toggleMenu);
            }
            
            // Close menu when clicking outside
            document.addEventListener('click', function(event) {
                const menu = document.getElementById('navMenu');
                const hamburger = document.querySelector('.hamburger');
                
                if (menu && hamburger && !menu.contains(event.target) && !hamburger.contains(event.target)) {
                    menu.classList.remove('show');
                }
            });

            // Close menu when pressing Escape key
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape') {
                    const menu = document.getElementById('navMenu');
                    if (menu) {
                        menu.classList.remove('show');
                    }
                }
            });
        };

        // Auto-initialize if this is loaded as a standalone page
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(() => {
                    initializeHamburgerMenu();
                }, 100);
            });
        } else {
            setTimeout(() => {
                initializeHamburgerMenu();
            }, 100);
        }
    </script>
</body>

</html>
