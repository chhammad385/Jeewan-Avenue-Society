<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>President Notification & Docs - Jeewan Avenue</title>
    <link href        // AGGRESSIVE SECURITY CHECK - Block immediately for unauthorized users
        const currentUser = await getCurrentUser();
        if (!currentUser || (currentUser.role !== 'Information-Secretary' && currentUser.role !== 'Information_Secretary' && 
            currentUser.role !== 'INFORMATION_SECRETARY')) {
            console.log('Role Security: BLOCKED handleAnnouncementSubmit - Information Secretary access required');
            showMessage('announcementMessage', '🚫 Access Denied: Only Information Secretary can post announcements', false);
            return false; // Block with error message
        }//fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        #announcement-form-container, #upload-form-container, #prayer-timing-container { max-width: 700px; margin: 40px auto; padding: 30px; background-color: #ffffff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15); }
        h2 { text-align: center; color: #2c3e50; font-weight: 600; margin-bottom: 20px; font-size: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #34495e; }
        input[type="text"], input[type="file"], input[type="time"], select, textarea { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input[type="time"] { 
            cursor: pointer; 
            background-color: #fff; 
            color: #2c3e50;
            font-family: 'Poppins', sans-serif;
        }
        input[type="time"]:focus { 
            border-color: #3498db; 
            outline: none; 
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); 
        }
        textarea { height: 120px; resize: vertical; }
        .date-time-group { display: flex; gap: 20px; flex-wrap: wrap; }
        .date-time-pair { flex: 1; min-width: 150px; }
        .prayer-time-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .prayer-time-pair { display: flex; flex-direction: column; }
        .prayer-time-pair label { 
            font-weight: 600; 
            color: #2c3e50; 
            margin-bottom: 8px; 
            font-size: 14px;
            text-transform: capitalize;
        }
        button { display: block; width: 100%; background: linear-gradient(90deg, #3498db, #2980b9); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; }
        .message { display: none; text-align: center; margin-top: 15px; padding: 10px; border-radius: 6px; }
        .success { background-color: #dff0d8; color: #3c763d; }
        .error { background-color: #f2dede; color: #a94442; }
    </style>
    <script src="/js/header-loader.js"></script>
    <script src="/js/header-menu.js"></script>
</head>
<body>
    <div id="header"></div>
    <div id="president_console"></div>

    <div id="announcement-form-container">
        <h2>Create a Community Announcement</h2>
        <div id="debug-info" style="background: #f0f8ff; padding: 10px; margin-bottom: 15px; border-radius: 5px; font-size: 12px; color: #333;">
            🔧 Checking permissions...
        </div>
        <form id="announcementForm">
            <div class="form-group"><label for="announcement-title">Announcement Title</label><input type="text" id="announcement-title" required></div>
            <div class="form-group"><label for="announcement-content">Announcement Details</label><textarea id="announcement-content" required></textarea></div>
            <div class="date-time-group">
                <div class="date-time-pair"><label for="start-datetime">Start Date & Time</label><input type="text" id="start-datetime" required></div>
                <div class="date-time-pair"><label for="end-datetime">End Date & Time</label><input type="text" id="end-datetime" required></div>
            </div>
            <button type="submit" class="upload-announcement-btn">Post Announcement</button>
            <div id="announcementMessage" class="message"></div>
        </form>
    </div>

    <div id="upload-form-container">
        <h2>Upload Society Document</h2>
        <form id="uploadForm">
            <div class="form-group"><label for="doc-title">Document Title</label><input type="text" id="doc-title" name="title" required /></div>
            <div class="form-group"><label for="doc-category">Category</label><select id="doc-category" name="category" required><option value="">-- Select --</option><option value="constitution">Constitution</option><option value="notification">Notification</option><option value="amendment">Amendment</option></select></div>
            <div class="form-group"><label for="doc-file">Select File</label><input type="file" id="doc-file" name="file" required /></div>
            <div class="form-group"><label for="doc-desc">Description</label><textarea id="doc-desc" name="description"></textarea></div>
            <button type="submit" class="upload-announcement-btn">Upload Document</button>
            <div id="uploadMessage" class="message"></div>
        </form>
    </div>

        <div id="prayer-timing-container">
        <h2>Set Prayer Timings</h2>
        <form id="prayerTimingForm">
            <div class="prayer-time-group">
                <div class="prayer-time-pair">
                    <label for="fajr-time">Fajr</label>
                    <input type="time" id="fajr-time" required step="60" placeholder="05:00">
                </div>
                <div class="prayer-time-pair">
                    <label for="dhuhr-time">Dhuhr</label>
                    <input type="time" id="dhuhr-time" required step="60" placeholder="12:30">
                </div>
                <div class="prayer-time-pair">
                    <label for="asr-time">Asr</label>
                    <input type="time" id="asr-time" required step="60" placeholder="16:00">
                </div>
                <div class="prayer-time-pair">
                    <label for="maghrib-time">Maghrib</label>
                    <input type="time" id="maghrib-time" required step="60" placeholder="18:00">
                </div>
                <div class="prayer-time-pair">
                    <label for="isha-time">Isha</label>
                    <input type="time" id="isha-time" required step="60" placeholder="19:30">
                </div>
                <div class="prayer-time-pair">
                    <label for="jumma-time">Jumma</label>
                    <input type="time" id="jumma-time" required step="60" placeholder="13:00">
                </div>
            </div>
            <button type="submit" class="prayer-timer-btn">Set Prayer Timings</button>
            <div id="prayerMessage" class="message"></div>
        </form>
    </div>    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <!-- Include common JavaScript functions -->
    <script src="/js/common.js"></script>
    <!-- Include announcement popup script for header button -->
    <script src="/js/announcement-popup.js"></script>
    <!-- Include role-based security script -->
    <script src="/js/role-security.js?v=10"></script>
<script>
    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', async () => {
        // Check page access with view-only permissions for other admin roles
        const accessResult = await checkPageAccess(
            ['Information-Secretary'], // Full access roles (Information Secretary only)
            ['President', 'General-Secretary', 'Vice-President', 'Finance-Secretary'] // View-only roles
        );
        
        if (!accessResult.hasAccess) return; // Page will redirect if no access
        
        // Set up view-only mode if user has limited permissions
        if (accessResult.isViewOnly) {
            setViewOnlyMode();
        }
        
        // DISABLE BUTTONS BASED ON ROLE PERMISSIONS
        await disableUnauthorizedButtons();
        
        // Load shared HTML
        fetch('header.html').then(r => r.text()).then(data => {
            document.getElementById('header').innerHTML = data;
            // Initialize header functions after loading
            if (typeof setActive === 'function') {
                setActive();
            }
            if (typeof loadUserProfileImage === 'function') {
                loadUserProfileImage();
            }
            
            // Initialize hamburger menu functionality
            setTimeout(() => {
                if (typeof window.initializeHamburgerMenu === 'function') {
                    window.initializeHamburgerMenu();
                }
            }, 100);
        });
        fetch('President Console.html').then(r => r.text()).then(data => document.getElementById('president_console').innerHTML = data);

        // Initialize all date/time pickers
        flatpickr("#start-datetime", { enableTime: true, dateFormat: "Y-m-d H:i" });
        flatpickr("#end-datetime", { enableTime: true, dateFormat: "Y-m-d H:i" });
        
        // Note: Prayer timing fields now use HTML5 time inputs for better usability

        // Attach form submission listeners
        document.getElementById('announcementForm').addEventListener('submit', handleAnnouncementSubmit);
        document.getElementById('uploadForm').addEventListener('submit', handleDocumentUpload);
        document.getElementById('prayerTimingForm').addEventListener('submit', handlePrayerTimeSubmit);

        // Load existing prayer times
        loadPrayerTimings();

        // Ensure prayer timing controls are editable by everyone.
        // Role-security may aggressively disable elements; re-enable and reattach handlers briefly after load.
        function enablePrayerTimingForAll() {
            try {
                const container = document.getElementById('prayer-timing-container');
                if (!container) return;
                // Re-enable all controls in the container
                container.querySelectorAll('input, button, select, textarea, form').forEach(el => {
                    try {
                        el.disabled = false;
                        el.removeAttribute('disabled');
                        el.style.pointerEvents = '';
                        el.style.opacity = '';
                        el.style.cursor = '';
                        el.classList.remove('security-disabled');
                        el.removeAttribute('data-security-disabled');
                        el.removeAttribute('aria-disabled');
                        if (el.getAttribute && el.getAttribute('tabindex') === '-1') el.removeAttribute('tabindex');
                    } catch (inner) { /* ignore per-element errors */ }
                });

                // Reattach submit listener in case role-security cloned the form
                const prayerForm = document.getElementById('prayerTimingForm');
                if (prayerForm) {
                    // Remove existing listeners by cloning and replacing, then attach our handler
                    const newForm = prayerForm.cloneNode(true);
                    prayerForm.parentNode.replaceChild(newForm, prayerForm);
                    newForm.addEventListener('submit', handlePrayerTimeSubmit);
                }
            } catch (e) {
                console.warn('enablePrayerTimingForAll error:', e);
            }
        }

        // Run immediately and repeat for a short period to counter aggressive role-security overrides
        enablePrayerTimingForAll();
        let enableCount = 0;
        const enableInterval = setInterval(() => {
            enablePrayerTimingForAll();
            enableCount++;
            if (enableCount >= 25) { // ~5 seconds at 200ms
                clearInterval(enableInterval);
            }
        }, 200);
    });

    // --- DISABLE UNAUTHORIZED BUTTONS ---
    async function disableUnauthorizedButtons() {
        const debugDiv = document.getElementById('debug-info');
        try {
            console.log('🔧 Checking button permissions...');
            debugDiv.innerHTML = '🔧 Checking button permissions...';
            
            const currentUser = await getCurrentUser();
            if (!currentUser) {
                console.log('❌ No user found, disabling all buttons');
                debugDiv.innerHTML = '❌ No user found, disabling all buttons';
                disableAllButtons();
                return;
            }
            
            console.log('✅ Current user role:', currentUser.role);
            debugDiv.innerHTML = `✅ Current user: ${currentUser.ownerName || currentUser.email} | Role: ${currentUser.role}`;
            
            // Check announcement permissions (Information Secretary ONLY)
            const canPostAnnouncements = currentUser.role === 'Information-Secretary' || 
                                       currentUser.role === 'Information_Secretary' || 
                                       currentUser.role === 'INFORMATION_SECRETARY';
            
            console.log('🔍 Can post announcements:', canPostAnnouncements);
            
            if (!canPostAnnouncements) {
                console.log('🚫 Disabling announcement button for role:', currentUser.role);
                debugDiv.innerHTML += `<br>🚫 Announcements: DISABLED (Role: ${currentUser.role} not authorized)`;
                disableButton('Post Announcement', 'announcementForm', 'Only Information Secretary can post announcements');
            } else {
                console.log('✅ User has announcement permissions');
                debugDiv.innerHTML += '<br>✅ Announcements: ENABLED';
            }
            
            // Check document upload permissions (Information Secretary only)
            const canUploadDocs = currentUser.role === 'Information-Secretary' || 
                               currentUser.role === 'Information_Secretary' || 
                               currentUser.role === 'INFORMATION_SECRETARY';
            
            console.log('🔍 Can upload documents:', canUploadDocs);
            
            if (!canUploadDocs) {
                console.log('🚫 Disabling document button for role:', currentUser.role);
                debugDiv.innerHTML += '<br>🚫 Documents: DISABLED (Information Secretary only)';
                disableButton('Upload Document', 'uploadForm', 'Only Information Secretary can upload documents');
            } else {
                console.log('✅ User has document upload permissions');
                debugDiv.innerHTML += '<br>✅ Documents: ENABLED';
            }
            
            // Prayer timings can be set by any admin role, so no restriction
            console.log('✅ Prayer timing permissions: Allowed for all admin roles');
            debugDiv.innerHTML += '<br>✅ Prayer Timings: ENABLED (All admin roles)';
            
        } catch (error) {
            console.error('❌ Error checking user permissions:', error);
            debugDiv.innerHTML = `❌ Error checking permissions: ${error.message}`;
            disableAllButtons();
        }
    }
    
    function disableButton(buttonText, formId, reason) {
        const form = document.getElementById(formId);
        if (form) {
            const button = form.querySelector('button[type="submit"]');
            if (button) {
                button.disabled = true;
                button.style.background = '#cccccc';
                button.style.cursor = 'not-allowed';
                button.style.opacity = '0.6';
                button.title = reason;
                button.innerHTML = `🚫 ${buttonText} (Unauthorized)`;
                console.log(`Disabled button: ${buttonText} - Reason: ${reason}`);
            }
        }
    }
    
    function disableAllButtons() {
        const buttons = document.querySelectorAll('button[type="submit"]');
        buttons.forEach(button => {
            button.disabled = true;
            button.style.background = '#cccccc';
            button.style.cursor = 'not-allowed';
            button.style.opacity = '0.6';
            button.title = 'Unauthorized access';
            button.innerHTML = '🚫 Unauthorized';
        });
    }

    // --- UTILITY TO DISPLAY MESSAGES ---
    function showMessage(elementId, text, isSuccess) {
        const el = document.getElementById(elementId);
        el.textContent = text;
        el.className = `message ${isSuccess ? 'success' : 'error'}`;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 5000);
    }

    // --- ANNOUNCEMENT FORM SUBMISSION ---
    async function handleAnnouncementSubmit(event) {
        event.preventDefault();
        
        // AGGRESSIVE SECURITY CHECK - Block immediately for unauthorized users
        const currentUser = await getCurrentUser();
        if (!currentUser || (currentUser.role !== 'Information-Secretary' && currentUser.role !== 'Information_Secretary' && 
            currentUser.role !== 'INFORMATION_SECRETARY' && currentUser.role !== 'President' && currentUser.role !== 'PRESIDENT')) {
            console.log('Role Security: BLOCKED handleAnnouncementSubmit - Information Secretary or President access required');
            showMessage('announcementMessage', '🚫 Access Denied: Only Information Secretary can post announcements', false);
            return false; // Block with error message
        }
        
        // Disable button during submission to prevent double-clicking
        const submitButton = event.target.querySelector('button[type="submit"]');
        const originalText = submitButton.innerHTML;
        submitButton.disabled = true;
        submitButton.innerHTML = '⏳ Posting...';
        
        const announcementData = {
            title: document.getElementById('announcement-title').value,
            content: document.getElementById('announcement-content').value,
            startDatetime: document.getElementById('start-datetime').value.replace(' ', 'T'),
            endDatetime: document.getElementById('end-datetime').value.replace(' ', 'T')
        };

        console.log('Sending announcement data:', announcementData);

        try {
            const response = await fetch('/api/announcements', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(announcementData)
            });
            
            const responseText = await response.text();
            console.log('Response status:', response.status);
            console.log('Response text:', responseText);
            
            if (!response.ok) {
                console.error('Server error - Status:', response.status, 'Text:', responseText);
                throw new Error(`Server error: ${response.status} - ${responseText}`);
            }
            
            showSuccess('✅ Announcement posted successfully!');
            event.target.reset();
        } catch (error) {
            console.error('Error details:', error);
            showError(`❌ Failed to post announcement: ${error.message}`);
        } finally {
            // Re-enable button
            submitButton.disabled = false;
            submitButton.innerHTML = originalText;
        }
    }

    // --- DOCUMENT UPLOAD FORM SUBMISSION ---
    async function handleDocumentUpload(event) {
        event.preventDefault();
        
        // ROLE SECURITY CHECK - Information Secretary only
        const currentUser = await getCurrentUser();
        if (!currentUser || (currentUser.role !== 'Information-Secretary' && currentUser.role !== 'Information_Secretary' && 
            currentUser.role !== 'INFORMATION_SECRETARY')) {
            console.log('Role Security: BLOCKED handleDocumentUpload - Information Secretary access required');
            showMessage('uploadMessage', '🚫 Access Denied: Only Information Secretary can upload documents', false);
            return false;
        }
        
        const form = event.target;
        const formData = new FormData(form);
        if (!formData.get('title') || !formData.get('category') || !formData.get('file').name) {
             showMessage('uploadMessage', 'Title, category, and file are required.', false);
             return;
        }

        // Disable button during upload
        const submitButton = event.target.querySelector('button[type="submit"]');
        const originalText = submitButton.innerHTML;
        submitButton.disabled = true;
        submitButton.innerHTML = '⏳ Uploading...';

        try {
            const response = await fetch('/api/documents', {
                method: 'POST',
                body: formData
            });
            if (!response.ok) throw new Error('Server error');
            showSuccess('✅ Document uploaded successfully!');
            form.reset();
        } catch (error) {
            showError('❌ Failed to upload document.');
        } finally {
            // Re-enable button
            submitButton.disabled = false;
            submitButton.innerHTML = originalText;
        }
    }
    
    // --- LOAD EXISTING PRAYER TIMINGS ---
    async function loadPrayerTimings() {
        try {
            console.log('Loading existing prayer timings...');
            const response = await fetch('/api/prayer-timings');
            
            if (response.ok) {
                const timings = await response.json();
                console.log('Loaded prayer timings:', timings);
                
                // Populate the form fields - convert from HH:mm format if needed
                if (timings.fajr) document.getElementById('fajr-time').value = convertToTimeFormat(timings.fajr);
                if (timings.dhuhr) document.getElementById('dhuhr-time').value = convertToTimeFormat(timings.dhuhr);
                if (timings.asr) document.getElementById('asr-time').value = convertToTimeFormat(timings.asr);
                if (timings.maghrib) document.getElementById('maghrib-time').value = convertToTimeFormat(timings.maghrib);
                if (timings.isha) document.getElementById('isha-time').value = convertToTimeFormat(timings.isha);
                if (timings.jumma) document.getElementById('jumma-time').value = convertToTimeFormat(timings.jumma);
            } else {
                console.warn('Failed to load prayer timings:', response.status);
            }
        } catch (error) {
            console.error('Error loading prayer timings:', error);
        }
    }
    
    // Helper function to ensure time is in HH:mm format
    function convertToTimeFormat(timeString) {
        if (!timeString) return '';
        // If already in HH:mm format, return as is
        if (timeString.match(/^\d{2}:\d{2}$/)) return timeString;
        // If in other format, try to parse and convert
        const time = new Date(`1970-01-01T${timeString}`);
        if (!isNaN(time)) {
            return time.toTimeString().slice(0, 5);
        }
        return timeString;
    }

    // --- PRAYER TIMING FORM SUBMISSION ---
    async function handlePrayerTimeSubmit(event) {
        event.preventDefault();
        
        // Disable submit button during processing
        const submitButton = event.target.querySelector('button[type="submit"]');
        const originalText = submitButton.innerHTML;
        submitButton.disabled = true;
        submitButton.innerHTML = '⏳ Updating...';
        
        const prayerData = {
            fajr: document.getElementById('fajr-time').value,
            dhuhr: document.getElementById('dhuhr-time').value,
            asr: document.getElementById('asr-time').value,
            maghrib: document.getElementById('maghrib-time').value,
            isha: document.getElementById('isha-time').value,
            jumma: document.getElementById('jumma-time').value,
        };

        console.log('Submitting prayer times:', prayerData);

        // Validate that all fields are filled
        const emptyFields = Object.entries(prayerData).filter(([key, value]) => !value).map(([key]) => key);
        if (emptyFields.length > 0) {
            showMessage('prayerMessage', `Please fill in all prayer times. Missing: ${emptyFields.join(', ')}`, false);
            submitButton.disabled = false;
            submitButton.innerHTML = originalText;
            return;
        }

        try {
            const response = await fetch('/api/prayer-timings', {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(prayerData)
            });
            
            console.log('Response status:', response.status);
            console.log('Response ok:', response.ok);
            
            if (!response.ok) {
                const errorText = await response.text();
                console.error('Server error:', errorText);
                throw new Error(`Server error: ${response.status} - ${errorText}`);
            }
            
            const result = await response.json();
            console.log('Success response:', result);
            showSuccess('✅ Prayer times updated successfully!');
        } catch (error) {
            console.error('Prayer timing update error:', error);
            showError(`❌ Failed to update prayer times: ${error.message}`);
        } finally {
            // Re-enable submit button
            submitButton.disabled = false;
            submitButton.innerHTML = originalText;
        }
    }
</script>
</body>
</html>
