<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plots & Shops - Jeewan Avenue</title>
    <style>
       .stats {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            justify-content: center;
        }
        .stat {
            padding: 1rem;
            border-radius: 5px;
            color: #2b2b2b;
            font-size: 0.875rem;
            min-width: 80px;
            text-align: center;
            flex: 1;
            max-width: 150px;
        }
        .stat.houses { background-color: #90e8f5; }
        .stat.shops { background-color: #f6a855; }
        .stat.completed { background-color: #22a522; }
        .stat.under-construction { background-color: #3b5dcc; }
        .stat.vacant { background-color: #c35d5b; }
        .stat.residential { background-color: #fb0606; }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
            justify-content: center;
        }
        .filters input {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            max-width: 300px;
            font-size: 0.875rem;
        }
        .filters .filter {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filters button {
            padding: 0.5rem 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            cursor: pointer;
            font-size: 0.875rem;
            flex: 1;
            max-width: 100px;
        }
        .filters .active, .filters button.houses, .filters button.shops {
            color: #fff;
        }
        .filters button.houses {
            background-color: #90e8f5;
            border-color: #90e8f5;
        }
        .filters button.shops {
            background-color: #f6a855;
            border-color: #f6a855;
        }
        .filters button.active {
            background-color: #6a9ee8;
            border-color: #6a9ee8;
        }
        .filters select {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            font-size: 0.875rem;
            width: 100%;
            max-width: 200px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
            padding: 1rem;
        }
        .plot {
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 70px;
            border-radius: 5px;
            font-size: 0.875rem;
            position: relative;
            flex-direction: column;
            opacity: 0;
            animation: fadeIn 1s ease-in-out forwards;
            transition: background-color 0.3s ease, transform 0.3s ease;
            cursor: pointer;
        }
        .plot.house { background-color: #90e8f5; color: #000000; }
        .plot.shop { background-color: #f6a855; color: #000000; }
        .plot:hover {
            background-color: #d3e7ff;
            transform: translateY(-5px);
        }
        .completed { border: 5px solid #22a522; }
        .under-construction { border: 5px solid #3b5dcc; }
        .vacant { border: 2px solid #c35d5b; }
        .residential { border: 5px solid #fb0606; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 1rem;
            overflow-y: auto;
        }
        .modal-content {
            background-color: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            animation: fadeInModal 0.3s ease-in-out;
            max-height: 90vh;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .modal-content h2 {
            margin: 0 0 1rem;
            font-size: 1.25rem;
            color: #333;
            text-align: center;
        }
        .modal-content label {
            display: flex;
            align-items: center;
            margin: 0.75rem 0 0.25rem;
            color: #333;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }
        .modal-content input[type="checkbox"] {
            width: auto;
            margin-right: 0.5rem;
            transform: scale(1.2);
            accent-color: #2c5282;
        }
        
        .modal-content input[type="checkbox"]:checked {
            background-color: #2c5282;
            border-color: #2c5282;
            filter: brightness(0.9);
        }
        .modal-content button {
            padding: 0.6rem 1.2rem;
            margin: 1rem 0.5rem 0 0;
            background-color: #6a9ee8;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }
        .modal-content button:hover {
            background-color: #4a90e2;
        }
        .modal-content .button-container {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        @keyframes fadeInModal {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }
            .stats {
                flex-direction: column;
                align-items: stretch;
            }
            .stat {
                max-width: none;
                font-size: 0.8rem;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filters input, .filters select {
                max-width: none;
            }
            .filters .filter {
                justify-content: center;
            }
            .filters button {
                max-width: none;
                font-size: 0.8rem;
            }
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            }
            .plot {
                height: 60px;
                font-size: 0.75rem;
            }
            .modal-content {
                max-width: 95%;
                padding: 1rem;
                max-height: 85vh;
                margin-right: 1rem; /* Added right margin for responsive view */
            }
            .modal-content h2 {
                font-size: 1.1rem;
            }
            .modal-content label {
                font-size: 0.85rem;
            }
            .modal-content input, .modal-content select, .modal-content button {
                font-size: 0.85rem;
                padding: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .stat {
                font-size: 0.75rem;
                padding: 0.4rem;
            }
            .filters input, .filters select, .filters button {
                font-size: 0.75rem;
                padding: 0.4rem;
            }
            .plot {
                height: 50px;
                font-size: 0.7rem;
            }
            .modal-content {
                padding: 0.75rem;
                margin-right: 0.75rem; /* Adjusted right margin for smaller screens */
            }
            .modal-content h2 {
                font-size: 1rem;
            }
            .modal-content label {
                font-size: 0.8rem;
            }
            .modal-content input, .modal-content select, .modal-content button {
                font-size: 0.8rem;
                padding: 0.4rem;
            }
            .modal-content .button-container {
                flex-direction: column;
                align-items: stretch;
            }
            .modal-content button {
                margin: 0.5rem 0;
            }
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="stats">
        <div class="stat houses" id="stat-houses">0 Houses</div>
        <div class="stat shops" id="stat-shops">0 Shops</div>
        <div class="stat completed" id="stat-completed">0 Completed</div>
        <div class="stat under-construction" id="stat-under-construction">0 Under Construction</div>
        <div class="stat vacant" id="stat-vacant">0 Vacant</div>
        <div class="stat residential" id="stat-residential">0 Residential</div>
    </div>
    <div class="filters">
        <input type="text" id="searchInput" placeholder="Search by plot ID, owner...">
        <button class="active type-filter" data-type="all">All</button>
        <button class="type-filter" data-type="house">Houses</button>
        <button class="type-filter" data-type="shop">Shops</button>
        <select id="statusFilter">
            <option value="all">All Status</option>
            <option value="completed">Completed</option>
            <option value="under-construction">Under Construction</option>
            <option value="vacant">Vacant</option>
            <option value="residential">Residential</option>
        </select>
    </div>
    <p id="plotCount" style="text-align: center;">Loading plots...</p>
    <div class="grid" id="plotGrid"></div>

    <div id="plotModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Plot Details</h2>
            <form id="plotForm">
                <input type="hidden" id="plotId">
                <div><label>Type:</label><input type="text" id="plotType" disabled></div>
                <div><label>Status:</label>
                    <select id="plotStatus" disabled>
                        <option value="completed">Completed</option>
                        <option value="under-construction">Under Construction</option>
                        <option value="vacant">Vacant</option>
                        <option value="residential">Residential</option>
                    </select>
                </div>
                <div><label>Owner Name:</label><input type="text" id="plotOwner" disabled></div>
                <div><label>Owner Phone:</label><input type="text" id="plotOwnerPhone" disabled></div>
                <div><label>Renter Name:</label><input type="text" id="plotRenter" disabled></div>
                <div><label>Renter Phone:</label><input type="text" id="plotRenterPhone" disabled></div>
                <div><label>Resident Status:</label>
                    <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                        <label style="display: flex; align-items: center; font-weight: normal;">
                            <input type="checkbox" id="residentOwner" disabled style="margin-right: 0.5rem;">
                            Owner
                        </label>
                        <label style="display: flex; align-items: center; font-weight: normal;">
                            <input type="checkbox" id="residentRenter" disabled style="margin-right: 0.5rem;">
                            Renter
                        </label>
                    </div>
                </div>
                <div class="button-container" style="text-align: right; margin-top: 1rem;">
                    <button type="button" id="editPlotButton" class="edit-plot-btn" onclick="enableEdit()">Edit Details</button>
                    <button type="submit" id="savePlotButton" class="save-plot-btn" style="display:none;">Save Changes</button>
                    <button type="button" onclick="closeModal()">Close</button>
                    <div id="roleDebugInfo" style="margin-top:0.5rem; color:#b00; font-size:0.9em;"></div>
                </div>
            </form>
        </div>
    </div>

<!-- Include common JavaScript functions -->
<script src="/js/common.js"></script>
<!-- Include announcement popup script for header button -->
<script src="/js/announcement-popup.js"></script>
<script>
    let allPlots = [];
    let currentUser = null;
    const plotGrid = document.getElementById('plotGrid');
    const plotModal = document.getElementById('plotModal');
    const plotForm = document.getElementById('plotForm');

    async function initializePage() {
        try {
            const [userRes, plotsRes] = await Promise.all([
                fetch('/api/users/me'),
                fetch('/api/plots')
            ]);
            
            if (!userRes.ok) window.location.href = '/Login Page.html';
            if (!plotsRes.ok) throw new Error('Failed to fetch plot data');
            
            currentUser = await userRes.json();
            allPlots = await plotsRes.json();
            
            applyFilters();
            updateStats();
        } catch (error) {
            console.error(error);
            document.getElementById('plotCount').textContent = 'Error loading page data.';
        }
    }

    function openModal(plot) {
        document.getElementById('modalTitle').textContent = `Details for Plot ${plot.id}`;
        document.getElementById('plotId').value = plot.id;
        document.getElementById('plotType').value = plot.type;
        document.getElementById('plotStatus').value = plot.status;
        document.getElementById('plotOwner').value = plot.ownerName || '';
        document.getElementById('plotOwnerPhone').value = plot.ownerPhone || '';
        document.getElementById('plotRenter').value = plot.renterName || '';
        document.getElementById('plotRenterPhone').value = plot.renterPhone || '';
        
        // Set resident status checkboxes
        document.getElementById('residentOwner').checked = plot.residentOwner || false;
        document.getElementById('residentRenter').checked = plot.residentRenter || false;

        const editButton = document.getElementById('editPlotButton');
        const saveButton = document.getElementById('savePlotButton');
        const allowedRoles = ["President", "General-Secretary"];
        const debugInfo = document.getElementById('roleDebugInfo');
        let unauthorized = false;

        if (currentUser && allowedRoles.includes(currentUser.role)) {
            editButton.style.display = 'inline-block';
            editButton.disabled = false;
            editButton.title = '';
            debugInfo.textContent = '';
        } else {
            editButton.style.display = 'inline-block';
            editButton.disabled = true;
            editButton.title = 'Unauthorized: Only President or General Secretary can edit plots.';
            debugInfo.textContent = `Unauthorized: Only President or General Secretary can edit/save plots. Your role: ${currentUser ? currentUser.role : 'Unknown'}`;
            unauthorized = true;
        }

        saveButton.style.display = 'none';
        saveButton.disabled = true;
        saveButton.title = 'Unauthorized: Only President or General Secretary can save changes.';

        document.querySelectorAll('#plotForm select, #plotForm input[type="text"], #plotForm input[type="tel"], #plotForm input[type="checkbox"]').forEach(el => el.disabled = true);
        plotModal.style.display = 'flex';
    }

    function enableEdit() {
        // Only allow edit if authorized
        const allowedRoles = ["President", "General-Secretary"];
        if (!(currentUser && allowedRoles.includes(currentUser.role))) {
            const debugInfo = document.getElementById('roleDebugInfo');
            debugInfo.textContent = `Unauthorized: Only President or General Secretary can edit/save plots. Your role: ${currentUser ? currentUser.role : 'Unknown'}`;
            return;
        }
        document.querySelectorAll('#plotStatus, #plotOwner, #plotOwnerPhone, #plotRenter, #plotRenterPhone, #residentOwner, #residentRenter').forEach(el => {
            el.disabled = false;
        });
        document.getElementById('editPlotButton').style.display = 'none';
        const saveButton = document.getElementById('savePlotButton');
        saveButton.style.display = 'inline-block';
        saveButton.disabled = false;
        saveButton.title = '';
        document.getElementById('roleDebugInfo').textContent = '';
    }

    async function handleFormSubmit(event) {
        event.preventDefault();
        const id = document.getElementById('plotId').value;
        const plotData = {
            id, type: document.getElementById('plotType').value,
            status: document.getElementById('plotStatus').value,
            ownerName: document.getElementById('plotOwner').value,
            ownerPhone: document.getElementById('plotOwnerPhone').value,
            renterName: document.getElementById('plotRenter').value,
            renterPhone: document.getElementById('plotRenterPhone').value,
            residentOwner: document.getElementById('residentOwner').checked,
            residentRenter: document.getElementById('residentRenter').checked
        };

        try {
            const response = await fetch(`/api/plots/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(plotData)
            });
            if (!response.ok) throw new Error('Failed to save changes');
            
            const updatedPlot = await response.json();
            const index = allPlots.findIndex(p => p.id === id);
            allPlots[index] = updatedPlot;
            
            applyFilters();
            updateStats();
            closeModal();
            showSuccess('✅ Plot details saved successfully!');
        } catch (error) {
            console.error(error);
            showError('❌ Error saving changes. You may not have permission.');
        }
    }

    function closeModal() { plotModal.style.display = 'none'; }

    function applyFilters() {
        const typeFilter = document.querySelector('.type-filter.active').dataset.type;
        const statusFilter = document.getElementById('statusFilter').value;
        const searchFilter = document.getElementById('searchInput').value.toLowerCase();
        const filteredPlots = allPlots.filter(plot => 
            (typeFilter === 'all' || plot.type === typeFilter) &&
            (statusFilter === 'all' || plot.status === statusFilter) &&
            (plot.id.toLowerCase().includes(searchFilter) || (plot.ownerName && plot.ownerName.toLowerCase().includes(searchFilter)))
        );
        renderGrid(filteredPlots);
        document.getElementById('plotCount').textContent = `Showing ${filteredPlots.length} of ${allPlots.length} plots`;
    }

    function renderGrid(plots) {
        plotGrid.innerHTML = '';
        plots.forEach(plot => {
            const plotEl = document.createElement('div');
            plotEl.className = `plot ${plot.type} ${plot.status}`;
            plotEl.innerHTML = `${plot.type === 'house' ? '🏠' : '🏪'}<br>${plot.id}`;
            plotEl.onclick = () => openModal(plot);
            plotGrid.appendChild(plotEl);
        });
    }

    function updateStats() {
        const stats = allPlots.reduce((acc, plot) => {
            acc[plot.type] = (acc[plot.type] || 0) + 1;
            acc[plot.status] = (acc[plot.status] || 0) + 1;
            return acc;
        }, { house: 0, shop: 0, completed: 0, 'under-construction': 0, vacant: 0, residential: 0 });
        document.getElementById('stat-houses').textContent = `${stats.house} Houses`;
        document.getElementById('stat-shops').textContent = `${stats.shop} Shops`;
        document.getElementById('stat-completed').textContent = `${stats.completed} Completed`;
        document.getElementById('stat-under-construction').textContent = `${stats['under-construction']} Under Construction`;
        document.getElementById('stat-vacant').textContent = `${stats.vacant} Vacant`;
        document.getElementById('stat-residential').textContent = `${stats.residential} Residential`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetch('header.html').then(r => r.text()).then(data => {
            document.getElementById('header').innerHTML = data;
            // Initialize hamburger menu after header loads
            if (window.initializeHamburgerMenu) {
                initializeHamburgerMenu();
            }
        });
        initializePage();
        document.getElementById('searchInput').addEventListener('keyup', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters);
        document.querySelectorAll('.type-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.type-filter.active').classList.remove('active');
                btn.classList.add('active');
                applyFilters();
            });
        });
        plotForm.addEventListener('submit', handleFormSubmit);
    });
</script>

<!-- Include role-based security script -->
<script src="/js/role-security.js"></script>
<script src="/js/header-menu.js"></script>

</body>
</html>
