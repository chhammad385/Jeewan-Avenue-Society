# Production Configuration for Web Server Deployment
# Server Configuration
server.port=8080
server.address=0.0.0.0

# Production domain configuration
app.domain=jeewanavenuesociety.me
app.allowed-origins=https://jeewanavenuesociety.me,https://www.jeewanavenuesociety.me

# MySQL Database Connection (Production)
spring.datasource.url=jdbc:mysql://localhost:3306/jeewan_avenue?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&requireSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate (Production)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Force ISO date strings
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=UTC

# File Upload Configuration (Production)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=/var/uploads/

# Security Configuration (Production)
app.security.jwt.secret=${JWT_SECRET:JeewanAvenueProductionSecretKey2024VerySecure}
app.security.jwt.expiration=86400000

# Session Configuration (Production)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m
server.servlet.session.cookie.domain=jeewanavenuesociety.me

# Production Logging Configuration
logging.level.com.jeewanavenue=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=/var/log/jeewan-avenue/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# Actuator Configuration (Production)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Compression and Performance
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Error handling
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never